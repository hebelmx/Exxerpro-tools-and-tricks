site_name: Exxer Tools & Tricks
site_description: A curated, no-nonsense collection of Windows tools, tricks, and fixes.
site_url: https://hebelmx.github.io/Exxerpro-tools-and-tricks/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - PowerToys:
      - ZoomIt Live Zoom: powertoys/zoomit-livezoom.md
  - Docker & WSL:
      - Docker Desktop / WSL2 recovery: docker-wsl/docker-desktop-wsl2-recovery.md
      - Modern Standby freezes & corruption: docker-wsl/modern-standby-freezes-wsl-corruption.md
  - VMware:
      - Fast Windows 11 VMs: vmware/windows-11-vm-performance.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
