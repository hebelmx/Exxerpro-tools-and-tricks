site_name: Exxer Tools & Tricks
site_description: A curated, no-nonsense collection of Windows tools, tricks, and fixes.
site_url: https://hebelmx.github.io/Exxerpro-tools-and-tricks/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - PowerToys:
      - ZoomIt Live Zoom: powertoys/zoomit-livezoom.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
